<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RMSL Three.js WebGPU Demo</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      }
      #container {
        width: 100vw;
        height: 100vh;
      }
      #info {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px;
        border-radius: 8px;
        font-size: 14px;
        max-width: 320px;
        pointer-events: none;
      }
      #info h1 {
        margin: 0 0 10px 0;
        font-size: 18px;
      }
      #info p {
        margin: 5px 0;
      }
      #error {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #ff6666;
        background: rgba(0,0,0,0.8);
        padding: 20px;
        border-radius: 8px;
        font-size: 16px;
        display: none;
        max-width: 80vw;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <h1>RMSL Three.js Adapter Demo (WebGPU)</h1>
      <p>Interact with the 3D scene:</p>
      <p>• Drag to rotate</p>
      <p>• Scroll to zoom</p>
      <p>• Uses RMSL compiled to WGSL via three's WebGPURenderer</p>
    </div>
    <div id="error"></div>
    <div id="container"></div>
    <script src="./main.ts" type="module"></script>
  </body>
</html>
