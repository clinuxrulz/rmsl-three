<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RMSL Three.js Demo</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      }
      #container {
        width: 100vw;
        height: 100vh;
      }
      #info {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px;
        border-radius: 8px;
        font-size: 14px;
        max-width: 300px;
        pointer-events: none;
      }
      #info h1 {
        margin: 0 0 10px 0;
        font-size: 18px;
      }
      #info p {
        margin: 5px 0;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <h1>RMSL Three.js Adapter Demo</h1>
      <p>Interact with the 3D scene:</p>
      <p>• Drag to rotate</p>
      <p>• Scroll to zoom</p>
      <p>• The material uses RMSL for procedural shaders</p>
    </div>
    <div id="container"></div>
    <script src="./main.ts" type="module"></script>
  </body>
</html>
