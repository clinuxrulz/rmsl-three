<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chrome Bug: WebGPURenderer WebGL fallback with specific GLSL shaders</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; color: #eee; font-family: monospace; font-size: 13px; }
  #log { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 6px; max-width: 600px; white-space: pre-wrap; pointer-events: none; z-index: 10; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="log">Loading...</div>

<script type="importmap">
{
  "imports": {
    "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.webgpu.js",
    "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.webgpu.js"
  }
}
</script>

<script type="module">
import {
  WebGPURenderer, NodeMaterial,
  glslFn, wgslFn, uniform, attribute, positionLocal,
  Scene, PerspectiveCamera, SphereGeometry, Mesh, Clock, Color,
  DoubleSide,
} from 'three/webgpu'

const logEl = document.getElementById('log')
function log(m) { logEl.textContent += m + '\n' }

log('UA: ' + navigator.userAgent)
log('gpu in navigator: ' + ('gpu' in navigator))

// Pre-compiled shaders (RMSL → GLSL/WGSL)
const VERTEX_GLSL = `vec4 vertexMain(float uTime, vec3 position, vec2 uv) {
  return vec4(vec3(position.x, position.y + sin(position.x * 10.0 + uTime * 2.0) * 0.1, position.z), 1.0);
}`

const VERTEX_WGSL = `fn vertexMain(uTime: f32, position: vec3<f32>, uv: vec2<f32>) -> vec4<f32> {
  return vec4<f32>(vec3<f32>(position.x, position.y + sin(position.x * 10f + uTime * 2f) * 0.1f, position.z), 1f);
}
`

const FRAGMENT_GLSL = `vec4 fragmentMain(float uTime, vec3 uColor1, vec3 uColor2, vec3 uColor3, vec2 uv, vec3 posLocal) {
  vec3 _rmsl_0 = mix(uColor1, uColor2, sin(uv.x * 10.0 + uTime * 0.5) * 0.5 + 0.5);
  vec3 _rmsl_1 = mix(uColor2, uColor3, sin(uv.y * 10.0 + uTime * 0.7) * 0.5 + 0.5);
  float _rmsl_2 = sin(posLocal.x * 10.0 + uTime * 2.0);
  float _rmsl_3 = sin(posLocal.z * 10.0 + uTime * 2.0);
  float _rmsl_4 = (_rmsl_2 + _rmsl_3) / 2.0;
  vec3 _rmsl_5 = _rmsl_0 * 0.7 + vec3(_rmsl_4 * 0.3);
  float _rmsl_6 = length(uv - vec2(0.5)) * 2.0 - 1.0;
  float _rmsl_7 = clamp(_rmsl_6 * -1.0, 0.25, 1.0);
  return vec4(_rmsl_5 * _rmsl_7, 1.0);
}`

const FRAGMENT_WGSL = `fn fragmentMain(uTime: f32, uColor1: vec3<f32>, uColor2: vec3<f32>, uColor3: vec3<f32>, uv: vec2<f32>, posLocal: vec3<f32>) -> vec4<f32> {
  var _rmsl_8: vec3<f32> = mix(uColor1, uColor2, sin(uv.x * 10f + uTime * 0.5f) * 0.5f + 0.5f);
  var _rmsl_9: vec3<f32> = mix(uColor2, uColor3, sin(uv.y * 10f + uTime * 0.7f) * 0.5f + 0.5f);
  var _rmsl_10: f32 = sin(posLocal.x * 10f + uTime * 2f);
  var _rmsl_11: f32 = sin(posLocal.z * 10f + uTime * 2f);
  var _rmsl_12: f32 = (_rmsl_10 + _rmsl_11) / 2f;
  var _rmsl_13: vec3<f32> = _rmsl_8 * 0.7f + vec3<f32>(_rmsl_12 * 0.3f);
  var _rmsl_14: f32 = length(uv - vec2<f32>(0.5f)) * 2f - 1f;
  var _rmsl_15: f32 = clamp(_rmsl_14 * -1f, 0.25f, 1f);
  return vec4<f32>(_rmsl_13 * _rmsl_15, 1f);
}
`

// Scene
const scene = new Scene()
scene.background = new Color(0x111111)
const camera = new PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000)
camera.position.z = 3

// WebGPURenderer with forceWebGL to always take the WebGL fallback path
const renderer = new WebGPURenderer({ antialias: true, forceWebGL: true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
document.body.prepend(renderer.domElement)

log('WebGPURenderer(forceWebGL) created')

// TSL nodes
const uTime = uniform(0)
const uColor1 = uniform(new Color(0xff0000))
const uColor2 = uniform(new Color(0x00ff00))
const uColor3 = uniform(new Color(0x0000ff))
const posAttr = attribute('position')
const uvAttr = attribute('uv')

const vertexTSLInputs = { uTime, position: posAttr, uv: uvAttr }
const fragmentTSLInputs = { uTime, uColor1, uColor2, uColor3, uv: uvAttr, posLocal: positionLocal }

// Material that selects GLSL or WGSL based on backend (like RMSLNodeMaterial)
const material = new NodeMaterial()
material.side = DoubleSide

material.build = function(builder) {
  const isWebGL = builder.renderer?.backend?.isWebGLBackend === true
  log('build(): backend.isWebGLBackend=' + isWebGL)
  const vertexFn = isWebGL ? glslFn(VERTEX_GLSL) : wgslFn(VERTEX_WGSL)
  const fragmentFn = isWebGL ? glslFn(FRAGMENT_GLSL) : wgslFn(FRAGMENT_WGSL)
  this.positionNode = vertexFn(vertexTSLInputs)
  this.vertexNode = null
  this.fragmentNode = fragmentFn(fragmentTSLInputs)
  NodeMaterial.prototype.build.call(this, builder)
}
material.needsUpdate = true

// Geometry
const geometry = new SphereGeometry(1, 64, 64)
const mesh = new Mesh(geometry, material)
scene.add(mesh)

// Animation
const clock = new Clock()

function animate() {
  requestAnimationFrame(animate)
  const t = clock.getElapsedTime()
  uTime.value = t
  uColor1.value = new Color('red')
  uColor2.value = new Color('green')
  uColor3.value = new Color('blue')
  mesh.rotation.y = t * 0.2
  mesh.rotation.x = Math.sin(0.3 * t) * 0.1
  renderer.render(scene, camera)
}

// Init
renderer.init().then(() => {
  const bt = renderer.backend.isWebGLBackend ? 'WebGL2' : 'WebGPU'
  log('✓ init() OK, backend=' + bt)
  log('✓ Starting animation...')
  animate()
}).catch((err) => {
  log('✗ init() FAILED: ' + err.message)
  if (err.stack) log('  ' + err.stack.split('\n').slice(0, 3).join('\n  '))
})
</script>
</body>
</html>
